<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABsensi Otonix Cibubur</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --primary: #4b0082; --secondary: #3f51b5; --bg: #f0f2f5; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      margin: 0; padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      border-top: 6px solid var(--primary);
      margin-bottom: 20px;
    }
    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      outline: none;
    }
    button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(63,81,181,0.3);
    }
    button:active { transform: scale(0.98); }
    button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .status-container { display: flex; gap: 12px; margin-top: 15px; }
    .status-opt {
      flex: 1; padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      color: var(--primary);
      transition: 0.3s;
    }
    .status-opt.active { background: var(--primary); color: white; border-color: var(--primary); }
    .storing-box {
      margin-top: 15px;
      background: #e8eaf6;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #c5cae9;
      display: flex;
      align-items: center;
    }
    .storing-box input[type="checkbox"] {
      width: 22px; height: 22px;
      margin-right: 12px; margin-top: 0; padding: 0;
      cursor: pointer; accent-color: var(--primary);
    }
    .storing-box label { cursor: pointer; font-weight: bold; color: var(--primary); font-size: 14px; }
    #previewContainer {
      width: 100%; height: 220px;
      border: 2px dashed var(--secondary);
      border-radius: 15px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f6ff;
      cursor: pointer;
      overflow: hidden;
    }
    #imgPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
    #placeholderText { text-align: center; color: var(--secondary); }
    #gpsStatus { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; color: #555; }
    #msg { text-align: center; margin-top: 15px; font-weight: bold; color: var(--primary); font-size: 14px; }
    #loadingOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }
    #loadingOverlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #fff3;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Mengirim data...</div>
</div>

<div class="card">
  <h3 style="text-align:center;color:var(--primary);margin:0 0 20px 0;">ABsensi OTONIX</h3>

  <select id="namaStaff">
    <option value="">&#128100; Pilih Nama Staff</option>
  </select>

  <div class="storing-box">
    <input type="checkbox" id="isStoring">
    <label for="isStoring">&#128295; SEDANG STORING (Luar Bengkel)</label>
  </div>

  <div class="status-container">
    <label class="status-opt active" id="optHadir"  onclick="pilihStatus('HADIR')">&#9989; HADIR</label>
    <label class="status-opt"       id="optPulang"  onclick="pilihStatus('PULANG')">&#127968; PULANG</label>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

  <div id="previewContainer" onclick="document.getElementById('cameraInput').click()">
    <div id="placeholderText">
      <span style="font-size:40px;">&#128247;</span><br>
      <b>KETUK UNTUK FOTO</b><br>
      <small>Wajah &amp; Background Lokasi</small>
    </div>
    <img id="imgPreview" alt="preview foto absen">
  </div>

  <div id="gpsStatus">&#128225; Menunggu GPS...</div>
  <button id="btnKirim" onclick="submitAbsensi()">KIRIM ABSENSI SEKARANG</button>
  <div id="msg"></div>
</div>

<script>
// ================================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZUpfGwEpi7d8OnR-KAxbXNpGuMWcGrI3VuEwzmgh3BI05CTHLPO_Kl8DWDahNhe26yQ/exec";
// ================================================================

var base64Foto   = null;
var statusAbsen  = "HADIR";
var koordinatGPS = null;
var gpsLoading   = false;

var namaSelect = document.getElementById('namaStaff');
var gpsStatus  = document.getElementById('gpsStatus');
var btnKirim   = document.getElementById('btnKirim');
var msg        = document.getElementById('msg');

/* ── Init ───────────────────────────────────────────────────── */
window.onload = function () {
  jsonpFetch({ action: "getStaffList" }, function (names) {
    names.forEach(function (n) {
      var opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      namaSelect.appendChild(opt);
    });
  });

  document.getElementById('cameraInput').addEventListener('change', function () {
    handleFile(this);
  });

  ambilGPSBackground();
};

/* ── JSONP untuk GET ────────────────────────────────────────── */
var jsonpCounter = 0;
function jsonpFetch(params, onSuccess, onError) {
  var cbName = '__cb' + (++jsonpCounter);
  params.callback = cbName;

  var url = APPS_SCRIPT_URL + '?' + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');

  window[cbName] = function (data) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (onSuccess) onSuccess(data);
  };

  var script = document.createElement('script');
  script.src = url;
  script.onerror = function () {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (onError) onError(new Error('Gagal memuat data'));
  };
  document.head.appendChild(script);
}

/* ── POST untuk kirim absensi ───────────────────────────────── */
function apiPost(payload, onSuccess, onError) {
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  })
    .then(function (r) { return r.json(); })
    .then(function (data) { if (onSuccess) onSuccess(data); })
    .catch(function (e) { if (onError) onError(e); });
}

/* ── Status ─────────────────────────────────────────────────── */
function pilihStatus(s) {
  statusAbsen = s;
  document.getElementById('optHadir').classList.toggle('active',  s === 'HADIR');
  document.getElementById('optPulang').classList.toggle('active', s === 'PULANG');
}

/* ── Kamera + Watermark ─────────────────────────────────────── */
function handleFile(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function (e) {
    var img = new Image();
    img.onload = function () {
      var canvas = document.createElement('canvas');
      var maxW   = 800;
      var ratio  = Math.min(1, maxW / img.width);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      var nama      = namaSelect.value || "-";
      var isStoring = document.getElementById('isStoring').checked;
      var tipeLabel = isStoring ? "STORING" : "BENGKEL";
      var now       = new Date();
      var jam       = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      var tgl       = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });

      var baris = [
        "OTONIX CIBUBUR",
        statusAbsen + "  -  " + tipeLabel,
        nama,
        tgl + "   " + jam
      ];

      var fontSize   = Math.max(14, Math.round(canvas.width / 26));
      var padding    = Math.round(fontSize * 0.65);
      var lineHeight = fontSize + padding;
      var boxH       = lineHeight * baris.length + padding * 2;
      var boxY       = canvas.height - boxH;

      ctx.fillStyle = 'rgba(0,0,0,0.60)';
      ctx.fillRect(0, boxY, canvas.width, boxH);
      ctx.fillStyle = '#4b0082';
      ctx.fillRect(0, boxY, canvas.width, Math.max(3, Math.round(fontSize * 0.2)));
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';

      baris.forEach(function (teks, i) {
        var y = boxY + padding + lineHeight * i;
        if (i === 0) {
          ctx.font = 'bold ' + Math.round(fontSize * 1.05) + 'px sans-serif';
          ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
          ctx.fillStyle = '#FFD700';          ctx.fillText(teks, padding, y);
        } else {
          ctx.font = (i === 2 ? 'bold ' : '') + fontSize + 'px sans-serif';
          ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
          ctx.fillStyle = 'white';            ctx.fillText(teks, padding, y);
        }
      });

      base64Foto = canvas.toDataURL('image/jpeg', 0.82);
      var preview = document.getElementById('imgPreview');
      preview.src = base64Foto;
      preview.style.display = 'block';
      document.getElementById('placeholderText').style.display = 'none';
      input.value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

/* ── GPS ────────────────────────────────────────────────────── */
function ambilGPSBackground() {
  if (!navigator.geolocation) { gpsStatus.textContent = 'GPS tidak didukung'; return; }
  gpsLoading = true;
  gpsStatus.textContent = '📡 Mengunci GPS...';
  navigator.geolocation.getCurrentPosition(
    function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
    function () {
      navigator.geolocation.getCurrentPosition(
        function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
        function () {
          gpsLoading = false; koordinatGPS = null;
          gpsStatus.innerHTML = '⚠️ GPS belum terkunci. <a href="#" onclick="ambilGPSBackground();return false;">Coba lagi</a>';
          setTimeout(ambilGPSBackground, 15000);
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    },
    { enableHighAccuracy: true, timeout: 25000, maximumAge: 30000 }
  );
}
function simpanKoordinat(pos) {
  koordinatGPS = { lat: pos.coords.latitude, lon: pos.coords.longitude };
  gpsLoading   = false;
  gpsStatus.textContent = '✅ GPS terkunci (akurasi ±' + Math.round(pos.coords.accuracy) + 'm)';
}

/* ── Submit ─────────────────────────────────────────────────── */
function submitAbsensi() {
  var nama      = namaSelect.value;
  var isStoring = document.getElementById('isStoring').checked;

  if (!nama)       return Swal.fire("Nama Kosong", "Silakan pilih nama Anda!", "warning");
  if (!base64Foto) return Swal.fire("Foto Kosong", "Ambil foto dulu!", "warning");
  if (gpsLoading)  return Swal.fire("Harap Tunggu", "GPS sedang mengunci lokasi.", "info");

  if (!koordinatGPS) {
    tampilkanLoading("Mencari GPS...");
    navigator.geolocation.getCurrentPosition(
      function (pos) { simpanKoordinat(pos); kirim(pos.coords.latitude, pos.coords.longitude, isStoring); },
      function () {
        navigator.geolocation.getCurrentPosition(
          function (pos) { simpanKoordinat(pos); kirim(pos.coords.latitude, pos.coords.longitude, isStoring); },
          function () {
            sembunyikanLoading();
            Swal.fire("GPS Gagal", "Gagal mendapatkan lokasi.<br>Pastikan GPS aktif dan izin lokasi diberikan.", "error");
          },
          { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 }
        );
      },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 60000 }
    );
    return;
  }
  kirim(koordinatGPS.lat, koordinatGPS.lon, isStoring);
}

function kirim(lat, lon, isStoring) {
  tampilkanLoading("Mengirim data absensi...");
  apiPost({
    action     : "prosesAbsen",
    lat        : lat,
    lon        : lon,
    namaStaff  : namaSelect.value,
    imageBase64: base64Foto,
    status     : statusAbsen,
    isStoring  : isStoring
  }, function (res) {
    sembunyikanLoading();
    if (typeof res === 'object' && res.status === "BERHASIL") {
      Swal.fire({
        title: "Berhasil!",
        html: "<b>" + res.nama + "</b><br>" + res.pesan + "<br><small>Jam: " + res.jam + "</small>",
        icon: "success",
        confirmButtonColor: "#4b0082"
      }).then(function () { location.reload(); });
    } else {
      var pesanErr = typeof res === 'string' ? res : JSON.stringify(res);
      Swal.fire("Gagal", pesanErr, "error");
    }
  }, function (err) {
    sembunyikanLoading();
    Swal.fire("Error", "Gagal menghubungi server: " + err.message, "error");
  });
}

function tampilkanLoading(teks) {
  document.getElementById('loadingText').textContent = teks || "Memproses...";
  document.getElementById('loadingOverlay').classList.add('show');
  btnKirim.disabled = true;
}
function sembunyikanLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
  btnKirim.disabled = false;
}
</script>
</body>
</html>
